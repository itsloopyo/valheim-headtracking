[workspace]
name = "valheim-head-tracking"
# Mirrors src/ValheimHeadTracking/ValheimHeadTracking.csproj <Version>.
# release.ps1 keeps these in sync; csproj is canonical.
version = "0.1.4"
description = "Head tracking mod for Valheim with aim decoupling"
channels = ["conda-forge"]
platforms = ["win-64"]

[tasks]
sync = "git submodule update --remote cameraunlock-core"
setup = "powershell -ExecutionPolicy Bypass -File scripts/setup-libs.ps1"
restore = "dotnet restore src/ValheimHeadTracking/ValheimHeadTracking.csproj"
build = { cmd = "dotnet build src/ValheimHeadTracking/ValheimHeadTracking.csproj -c Release", depends-on = ["setup", "restore"] }
# Bump vendored mod-loader copies to latest upstream within pinned range.
# Manual; commit the result. CI does not run this.
update-deps = "powershell -ExecutionPolicy Bypass -File scripts/update-deps.ps1"
install = { cmd = "powershell -ExecutionPolicy Bypass -File scripts/deploy.ps1 Release", depends-on = ["build"] }
package = { cmd = "powershell -ExecutionPolicy Bypass -File scripts/package-release.ps1", depends-on = ["build"] }
uninstall = "scripts\\uninstall.cmd"
clean = "dotnet clean src/ValheimHeadTracking/ValheimHeadTracking.csproj"

# Validate release readiness (optional pre-check)
validate-release = "powershell -ExecutionPolicy Bypass -File scripts/validate-release.ps1"

# Release workflow: pixi run release <major|minor|patch|X.Y.Z>
# Updates csproj version, commits, tags, and pushes to trigger CI release
release = "powershell -ExecutionPolicy Bypass -File scripts/release.ps1"
