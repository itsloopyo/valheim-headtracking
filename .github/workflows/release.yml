name: Release
run-name: "Release ${{ github.ref_name }}"

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  release:
    name: Build and Release
    runs-on: windows-latest
    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          submodules: recursive

      - name: Extract version from tag
        id: version
        shell: pwsh
        run: |
          $tag = "${{ github.ref_name }}"
          if ($tag -notmatch '^v(\d+\.\d+\.\d+)$') {
            Write-Host "::error::Tag format invalid. Use semantic versioning: v1.2.3"
            exit 1
          }
          $version = $matches[1]
          echo "version=$version" >> $env:GITHUB_OUTPUT
          echo "tag=$tag" >> $env:GITHUB_OUTPUT

      - name: Validate version matches csproj
        shell: pwsh
        run: |
          $csproj = Get-Content "src/ValheimHeadTracking/ValheimHeadTracking.csproj" -Raw
          $match = [regex]::Match($csproj, '<Version>([^<]+)</Version>')
          if (-not $match.Success) {
            Write-Host "::error::No <Version> found in csproj"
            exit 1
          }
          $csprojVersion = $match.Groups[1].Value
          $tagVersion = "${{ steps.version.outputs.version }}"
          if ($csprojVersion -ne $tagVersion) {
            Write-Host "::error::Version mismatch! Tag is v$tagVersion but csproj has $csprojVersion"
            exit 1
          }

      - name: Setup .NET
        uses: actions/setup-dotnet@v5
        with:
          dotnet-version: '8.0.x'

      - name: Setup pixi
        uses: prefix-dev/setup-pixi@v0.9.6
        with:
          run-install: false

      - name: Build and package
        shell: pwsh
        run: pixi run package

      - name: Generate release notes
        shell: pwsh
        run: |
          $artifactPaths = @(
            "src/ValheimHeadTracking/",
            "cameraunlock-core",
            "scripts/install.cmd",
            "scripts/uninstall.cmd",
            ".github/workflows/"
          )

          & cameraunlock-core/scripts/generate-release-notes.ps1 `
            -Version "${{ steps.version.outputs.version }}" `
            -ArtifactPaths $artifactPaths `
            -ProjectName "Head Tracking for Valheim"

      - name: Find release ZIPs
        id: find_zips
        shell: pwsh
        run: |
          $installerZip = Get-ChildItem release/*-installer.zip -ErrorAction SilentlyContinue | Select-Object -First 1
          $nexusZip = Get-ChildItem release/*-nexus.zip -ErrorAction SilentlyContinue | Select-Object -First 1

          if (-not $installerZip) {
            Write-Host "::error::Installer ZIP not produced"
            exit 1
          }

          echo "installer_zip=$($installerZip.FullName)" >> $env:GITHUB_OUTPUT
          if ($nexusZip) { echo "nexus_zip=$($nexusZip.FullName)" >> $env:GITHUB_OUTPUT }

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: |
          $tag = "${{ steps.version.outputs.tag }}"
          $installerZip = "${{ steps.find_zips.outputs.installer_zip }}"
          $nexusZip = "${{ steps.find_zips.outputs.nexus_zip }}"
          $assets = @($installerZip)
          if ($nexusZip) { $assets += $nexusZip }

          gh release create $tag `
            --title "Head Tracking for Valheim $tag" `
            --notes-file "release-notes.txt" `
            @assets

          if ($LASTEXITCODE -ne 0) { Write-Host "::error::Failed to create GitHub release"; exit 1 }
